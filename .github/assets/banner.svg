<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="50%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <linearGradient id="label-bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#334155"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="300" fill="url(#bg)" rx="12"/>

  <!-- Subtle grid pattern -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
  </pattern>
  <rect width="1200" height="300" fill="url(#grid)" rx="12"/>

  <!-- Decorative accent line -->
  <rect x="0" y="0" width="1200" height="3" fill="url(#accent)" rx="1.5"/>

  <!-- 3D Label illustration (left side) -->
  <g transform="translate(80, 90)" filter="url(#shadow)">
    <!-- Label base -->
    <rect width="220" height="120" rx="8" fill="url(#label-bg)" stroke="#475569" stroke-width="1.5"/>
    <!-- Label border (raised part) -->
    <rect x="6" y="6" width="208" height="108" rx="5" fill="none" stroke="url(#accent)" stroke-width="2" stroke-opacity="0.8"/>
    <!-- Divider line -->
    <line x1="75" y1="20" x2="75" y2="100" stroke="url(#accent)" stroke-width="1.5" stroke-opacity="0.6"/>
    <!-- Wrench icon (simplified) -->
    <g transform="translate(38, 60) rotate(-45)" fill="url(#accent)" opacity="0.9">
      <rect x="-4" y="-20" width="8" height="40" rx="2"/>
      <circle cx="0" cy="-20" r="10" fill="none" stroke="url(#accent)" stroke-width="4"/>
    </g>
    <!-- Text "TOOLS" -->
    <text x="148" y="55" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="800" fill="#e2e8f0" text-anchor="middle" letter-spacing="3">TOOLS</text>
    <!-- Subtext -->
    <text x="148" y="78" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle" letter-spacing="1">workshop</text>
  </g>

  <!-- Main title -->
  <text x="420" y="120" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="42" font-weight="800" fill="#f1f5f9" letter-spacing="-1">Label Maker</text>

  <!-- Subtitle -->
  <text x="420" y="158" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="#94a3b8" letter-spacing="0.5">Parametric 3D-printable labels for storage baskets</text>

  <!-- Feature pills -->
  <g transform="translate(420, 180)">
    <!-- Pill: Dual-Color -->
    <rect x="0" y="0" width="110" height="28" rx="14" fill="#38bdf8" fill-opacity="0.12" stroke="#38bdf8" stroke-opacity="0.3" stroke-width="1"/>
    <text x="55" y="19" font-family="system-ui, sans-serif" font-size="12" fill="#38bdf8" text-anchor="middle" font-weight="600">Dual-Color 3D</text>

    <!-- Pill: Web UI -->
    <rect x="122" y="0" width="82" height="28" rx="14" fill="#818cf8" fill-opacity="0.12" stroke="#818cf8" stroke-opacity="0.3" stroke-width="1"/>
    <text x="163" y="19" font-family="system-ui, sans-serif" font-size="12" fill="#818cf8" text-anchor="middle" font-weight="600">Web UI</text>

    <!-- Pill: CLI -->
    <rect x="216" y="0" width="60" height="28" rx="14" fill="#34d399" fill-opacity="0.12" stroke="#34d399" stroke-opacity="0.3" stroke-width="1"/>
    <text x="246" y="19" font-family="system-ui, sans-serif" font-size="12" fill="#34d399" text-anchor="middle" font-weight="600">CLI</text>

    <!-- Pill: Icons -->
    <rect x="288" y="0" width="118" height="28" rx="14" fill="#fb923c" fill-opacity="0.12" stroke="#fb923c" stroke-opacity="0.3" stroke-width="1"/>
    <text x="347" y="19" font-family="system-ui, sans-serif" font-size="12" fill="#fb923c" text-anchor="middle" font-weight="600">600+ Icons</text>
  </g>

  <!-- Tech stack (bottom right) -->
  <g transform="translate(420, 230)">
    <text font-family="ui-monospace, 'SF Mono', monospace" font-size="12" fill="#64748b">
      <tspan>Built with</tspan>
      <tspan fill="#f472b6" font-weight="600"> Bun</tspan>
      <tspan fill="#64748b"> · </tspan>
      <tspan fill="#38bdf8" font-weight="600">TypeScript</tspan>
      <tspan fill="#64748b"> · </tspan>
      <tspan fill="#818cf8" font-weight="600">React</tspan>
      <tspan fill="#64748b"> · </tspan>
      <tspan fill="#fbbf24" font-weight="600">OpenSCAD</tspan>
    </text>
  </g>

  <!-- Floating decorative elements -->
  <circle cx="1050" cy="80" r="60" fill="#38bdf8" opacity="0.04"/>
  <circle cx="1100" cy="200" r="80" fill="#818cf8" opacity="0.04"/>
  <circle cx="950" cy="250" r="40" fill="#34d399" opacity="0.04"/>

  <!-- Corner accent -->
  <rect x="1160" y="280" width="30" height="3" rx="1.5" fill="url(#accent)" opacity="0.5"/>
  <rect x="1180" y="264" width="3" height="30" rx="1.5" fill="url(#accent)" opacity="0.5"/>
</svg>
