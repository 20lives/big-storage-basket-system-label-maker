name: Bug Report
description: Report a bug to help us improve
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug
      placeholder: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior
      placeholder: |
        1. Go to...
        2. Click on...
        3. See error...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What should happen instead?
      placeholder: I expected...
    validations:
      required: true
  - type: checkboxes
    id: environment
    attributes:
      label: Environment
      options:
        - label: CLI
        - label: Web UI
  - type: input
    id: bun_version
    attributes:
      label: Bun Version
      placeholder: "1.0.0"
  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - macOS
        - Linux
        - Windows
